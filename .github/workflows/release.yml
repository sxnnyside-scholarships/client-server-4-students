name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry to use in-project venv
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build Standalone Executable
        run: just build

      - name: Rename Executable (Windows)
        if: matrix.os == 'windows-latest'
        run: mv dist/CS4S.exe dist/CS4S-windows.exe

      - name: Rename Executable (macOS)
        if: matrix.os == 'macos-latest'
        run: mv dist/CS4S dist/CS4S-macos

      - name: Rename Executable (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/CS4S dist/CS4S-linux

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CS4S-windows.exe
            dist/CS4S-macos
            dist/CS4S-linux
