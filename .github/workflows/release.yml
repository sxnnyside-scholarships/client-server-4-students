name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: CS4S-linux-x86_64.tar.gz
          - os: macos-latest
            artifact_name: CS4S-macos.dmg
          - os: windows-latest
            artifact_name: CS4S-windows-x64.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry to use in-project venv
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install

      - name: Install Qt6 system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxcb-cursor0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 libxcb-shape0 libx11-xcb1

      - name: Build
        run: poetry run python scripts/build_dist.py

      # Linux: pack the single binary into a .tar.gz
      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          tar -czf CS4S-linux-x86_64.tar.gz CS4S

      # macOS: create a proper .dmg disk image from the .app bundle
      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist/dmg_stage
          cp -r dist/CS4S.app dist/dmg_stage/
          ln -s /Applications dist/dmg_stage/Applications
          hdiutil create \
            -volname "CS4S" \
            -srcfolder dist/dmg_stage \
            -ov \
            -format UDZO \
            dist/CS4S-macos.dmg

      # Windows: rename to include platform and arch
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: mv dist/CS4S.exe dist/CS4S-windows-x64.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
