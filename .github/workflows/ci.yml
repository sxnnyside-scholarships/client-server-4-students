name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry to use in-project venv
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Qt6 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxcb-cursor0 libxkbcommon-x11-0 xvfb libasound2t64 libdbus-1-3 libnss3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 libxcb-shape0 libx11-xcb1

      - name: Run checks and tests
        run: xvfb-run -a just check
